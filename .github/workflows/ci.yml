name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Skip local-LLM tests (ollama/lmstudio); provider live/E2E tests self-skip
  # via describe.skipIf(!process.env.*_API_KEY) when no keys are present.
  PI_NO_LOCAL_LLM: "1"

jobs:
  ubuntu:
    name: check, build & test (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      # Supply-chain policy: lifecycle scripts stay disabled (see README).
      # package-lock.json is the dependency ground truth and is not modified.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # providers/data/ is gitignored runtime data; fresh checkouts must
      # hydrate it (network fetch + generate-models overrides) before any
      # typecheck or build can resolve the data/*.json imports.
      - name: Hydrate model data
        run: npm run hydrate:model-data

      # Build BEFORE check: tsgo --noEmit (in npm run check) resolves
      # @musepi/* imports via their dist outputs, which don't exist on a
      # fresh runner until something builds them.
      - name: Build all packages
        run: npm run build:offline

      - name: Lint, format, type check & lockfile checks
        run: npm run check

      - name: Test musepi suite (core + transcript)
        run: |
          npm test --workspace @musepi/core
          npm test --workspace @musepi/transcript

  windows:
    name: build & targeted tests (windows)
    runs-on: windows-latest
    timeout-minutes: 45
    # The full coding-agent vitest suite has 33 known environment-baseline
    # failures on Windows (pre-existing, not regressions). This job is
    # informational until that baseline is fixed; it covers the musepi
    # packages and pi-ai only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Hydrate model data
        run: npm run hydrate:model-data

      - name: Build all packages
        run: npm run build:offline

      - name: Test musepi suite (core + transcript)
        run: |
          npm test --workspace @musepi/core
          npm test --workspace @musepi/transcript
